<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reports</title>
    <link rel="stylesheet" href="/static/css/app.css">
    <script src="/static/js/api-client.js" defer></script>
    <script src="/static/js/reports.js" defer></script>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <h1>Reports</h1>
          <p>Paynkolay POS</p>
        </div>
        <nav aria-label="Primary">
          <a class="nav-link" href="/">Payment</a>
          <a class="nav-link active" href="/reports">Reports</a>
        </nav>
      </header>
      <main class="workspace single">
        <section class="panel">
          <div class="panel-heading">
            <h2>Allure</h2>
            <span class="status-pill neutral" id="report-status">Checking</span>
          </div>
          <dl class="result-list">
            <div>
              <dt>Path</dt>
              <dd id="report-path">-</dd>
            </div>
            <div>
              <dt>Entrypoint</dt>
              <dd id="report-entrypoint">-</dd>
            </div>
            <div>
              <dt>Status</dt>
              <dd id="report-message">Checking report status</dd>
            </div>
          </dl>
          <p class="inline-message" id="report-help">
            Generate the report with make report, then refresh this page.
          </p>
        </section>
      </main>
    </div>
  </body>
</html>
