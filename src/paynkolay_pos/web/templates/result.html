<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Payment Result</title>
    <link rel="stylesheet" href="/static/css/app.css">
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <h1>Payment Result</h1>
          <p>Paynkolay POS</p>
        </div>
        <nav aria-label="Primary">
          <a class="nav-link" href="/">Payment</a>
          <a class="nav-link" href="/reports">Reports</a>
        </nav>
      </header>
      <main class="workspace single">
        <section class="panel">
          <div class="panel-heading">
            <h2>Result</h2>
            <span class="status-pill neutral">Phase 1</span>
          </div>
          <dl class="result-list">
            <div>
              <dt>Order ID</dt>
              <dd id="result-order-id">Pending session storage</dd>
            </div>
            <div>
              <dt>Status</dt>
              <dd>Not tracked</dd>
            </div>
          </dl>
        </section>
      </main>
    </div>
  </body>
</html>
