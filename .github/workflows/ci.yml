name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "poetry"
          cache-dependency-path: "poetry.lock"

      - name: Install Poetry
        run: python -m pip install "poetry==2.4.1"

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Check Poetry project metadata
        run: poetry check

      - name: Run Ruff
        run: poetry run ruff check .

      - name: Run mypy
        run: poetry run mypy src tests

      - name: Run pytest
        run: poetry run pytest

  three-ds-browser:
    name: 3DS browser checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "poetry"
          cache-dependency-path: "poetry.lock"

      - name: Install Poetry
        run: python -m pip install "poetry==2.4.1"

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Install Chromium
        run: poetry run playwright install --with-deps chromium

      - name: Run 3DS browser tests
        run: poetry run pytest -m three_ds
